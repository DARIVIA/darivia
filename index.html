<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARIVIA</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* Убираем все лишние отступы и фиксируем высоту */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100 vh; /* Высота на весь экран */
            width: 100 vw;
            overflow: hidden; /* Запрещаем прокрутку */
            background-color: #ffffff;
        }

        body {
            display: flex;
            justify-content: center; /* Центровка по горизонтали */
            align-items: center;     /* Центровка по вертикали */
            font-family: 'Open Sans', sans-serif;
        }

        .container {
            width: 100 %;
            padding: 0 40 px; /* Ваши пендинги (отступы) */
            text-align: center;
        }

        h1 {
            /* 
               Формула: 100vw (ширина) минус 80px (отступы 40+40). 
               Делим на коэффициент 4.8, чтобы 7 букв "DARIVIA" вписались в строку.
            */
            font-size: calc ((100 vw - 80 px) / 4.8); 
            line-height: 1;
            color: #000;
            text-transform: uppercase;
            font-weight: 400; /* Regular */
            white-space: nowrap; /* Запрет переноса на новую строку */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DARIVIA</h1>
    </div>
</body>
</html>

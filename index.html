<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARIVIA</title>
    <link href="https://googleapis.com" rel="stylesheet">
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100 vh;
            width: 100 vw;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
        }

        .container {
            width: 100 %;
            /* Отступы по бокам (пендинги) */
            padding: 0 5 vw; 
            text-align: center;
        }

        h1 {
            /* 
               Уменьшаем делитель до 4.3 для максимального размера.
               10vw — это суммарные отступы (5vw + 5vw).
            */
            font-size: calc ((100 vw - 10 vw) / 4.3); 
            line-height: 0.8; /* Поджимаем межстрочный интервал для плотности */
            color: #000;
            text-transform: uppercase;
            font-weight: 700; /* Сделаем чуть жирнее, чтобы выглядело солиднее */
            white-space: nowrap;
            letter-spacing: -0.02 em; /* Немного сближаем буквы для эффекта логотипа */
        }
    </style>

</head>
<body>
    <div class="container">
        <h1>DARIVIA</h1>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DARIVIA</title>

  <!-- Open Sans Regular -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 5vw;
      overflow: hidden;
    }

    .title {
      font-family: 'Open Sans', sans-serif;
      font-weight: 400;
      color: #1a1a1a;
      text-align: center;
      line-height: 1;

      font-size: clamp(40px, 12vw, 200px);
      width: 100%;

      /* стартовое состояние */
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      filter: blur(8px);

      /* анимация */
      animation: luxuryReveal 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.3s;
    }

    @keyframes luxuryReveal {
      0% {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
        filter: blur(8px);
      }
      60% {
        opacity: 0.7;
        transform: translateY(5px) scale(1.01);
        filter: blur(2px);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    /* лёгкий финальный "дыхательный" микромоушн */
    .title::after {
      content: '';
      display: block;
      width: 100%;
      height: 0;
      animation: subtleBreath 4s ease-in-out infinite;
    }

    @keyframes subtleBreath {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.002); }
    }

    /* уменьшение анимаций для accessibility */
    @media (prefers-reduced-motion: reduce) {
      .title {
        animation: none;
        opacity: 1;
        transform: none;
        filter: none;
      }
    }
  </style>
</head>
<body>
  <div class="title">DARIVIA</div>
</body>
</html>
